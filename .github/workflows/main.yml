name: Deploy_LifeGoals

on:
  push:
    branches: [ master ]

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Node.js 20
      uses: actions/setup-node@v1
      with:
        node-version: 20.x

    - name: Install and Build
      run: |
        npm install
        npm run build -- --output-path=docs --base-href /
        if [ -d "docs/browser" ]; then mv docs/browser/* docs/ && rm -rf docs/browser; fi

    - name: Docker Login
      env:
        DOCKER_USER: ${{secrets.DOCKER_USER}}
        DOCKER_PASSWORD: ${{secrets.DOCKER_PASSWORD}}
      run: |
        echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USER" --password-stdin

    - name: Build and Push Docker Image
      run: |
        docker run -d --name temp_container httpd
        docker cp docs/. temp_container:/usr/local/apache2/htdocs
        docker commit temp_container ${{secrets.DOCKER_USER}}/lifegoals:latest
        docker push ${{secrets.DOCKER_USER}}/lifegoals:latest
