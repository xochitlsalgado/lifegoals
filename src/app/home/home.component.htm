<div style="background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); max-width: 500px; margin: auto;">
  <h2 style="text-align: center; color: #2c3e50;">🎯 Mis Metas de Vida</h2>
  
  <div style="display: flex; gap: 10px; margin-bottom: 20px;">
    <input [(ngModel)]="nuevaMetaTexto" placeholder="Ej. Viajar a Japón..." 
           style="flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; outline: none;">
    <button (click)="guardar()" style="background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;">+</button>
  </div>

  <div *ngFor="let item of metasList" style="display: flex; justify-content: space-between; align-items: center; background: #f8f9fa; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #3498db;">
    <span>{{ item.meta }}</span>
    <button (click)="eliminar(item.id)" style="background: #e74c3c; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer;">Borrar</button>
  </div>
</div>
